name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockwise
          POSTGRES_PASSWORD: stockwise
          POSTGRES_DB: stockwise_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockwise -d stockwise_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      GEMINI_API_KEY: test-key
      FINMIND_TOKEN: test-token
      DATABASE_URL: sqlite:///./test.db
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - run: pip install --require-hashes -r requirements.lock
      - run: pip install pytest pytest-asyncio pytest-cov ruff pip-audit
      - run: pytest -q
      - run: ruff check app tests alembic
      - name: PostgreSQL migration smoke
        env:
          DATABASE_URL: postgresql+psycopg://stockwise:stockwise@localhost:5432/stockwise_test
        run: alembic upgrade head && alembic downgrade base && alembic upgrade head
      - run: pip-audit -r requirements.lock

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t stockwise-backend ./backend
      - run: docker build -t stockwise-frontend ./frontend
