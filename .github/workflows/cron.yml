# 手動觸發單一 job 的後備入口（2026-07 遷移 Zeabur 後，定時排程已全數退役）。
#
# 排程現由後端自己的 APScheduler 執行（SCHEDULER_MODE=internal，見
# backend/app/scheduler/jobs.py::start_scheduler）：專屬伺服器不會休眠，
# 不再需要外部觸發兼喚醒，也擺脫了 GitHub cron 1~2 小時的延遲。
# 每一輪都經 JobRun 佇列，執行時間與結果在「工作中心」可查。
#
# 需設定 repo secrets：BACKEND_URL（指向 Zeabur）、JOB_TOKEN；選配 NOTIFY_WEBHOOK_URL。
name: daily-jobs

on:
  workflow_dispatch:
    inputs:
      job:
        description: "手動觸發單一 job（如 sync-tw、news-us、ai-batch-tw）"
        required: true

env:
  BASE: ${{ secrets.BACKEND_URL }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Wait for backend
        run: |
          for i in $(seq 1 8); do
            curl -sf --max-time 20 "$BASE/api/v1/health" && exit 0
            echo "waiting for backend... ($i)"; sleep 15
          done
          echo "backend did not respond"; exit 1

      - name: Manual job
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: bash .github/scripts/run-job.sh "${{ inputs.job }}"

      - name: Notify on failure
        if: failure()
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -n "$NOTIFY_WEBHOOK_URL" ]; then
            curl -sf --max-time 20 -X POST "$NOTIFY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"daily-jobs 手動觸發失敗（${{ inputs.job }}）: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              || echo "notify webhook failed"
          else
            echo "NOTIFY_WEBHOOK_URL not set; skip notification"
          fi
