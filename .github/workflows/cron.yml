# 方案 B 排程（docs/SD.md §6.2）：Render 免費層會休眠，排程由此觸發並順便喚醒。
# 時間為 UTC（台灣 = UTC+8）。需設定 repo secrets：BACKEND_URL、JOB_TOKEN。
name: daily-jobs

on:
  schedule:
    - cron: "40 5 * * 1-5"   # 13:40 TW — 台股新聞研究（背景執行）
    - cron: "30 6 * * 1-5"   # 14:30 TW — 台股：同步→撮合→淨值→警示→AI批次→產生委託
    - cron: "40 20 * * 1-5"  # 04:40 TW 次日 — 美股新聞研究（背景執行）
    - cron: "30 21 * * 1-5"  # 05:30 TW 次日 — 美股：同步→撮合→淨值→警示→AI批次→產生委託
  workflow_dispatch:
    inputs:
      job:
        description: "手動觸發單一 job（如 sync-tw、news-us、ai-batch-tw）"
        required: true

env:
  BASE: ${{ secrets.BACKEND_URL }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Wake Render (free tier cold start)
        run: |
          for i in $(seq 1 8); do
            curl -sf --max-time 20 "$BASE/api/v1/health" && exit 0
            echo "waiting for backend... ($i)"; sleep 15
          done
          echo "backend did not wake up"; exit 1

      - name: Manual job
        if: github.event_name == 'workflow_dispatch'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: bash .github/scripts/run-job.sh "${{ inputs.job }}"

      - name: TW news research
        if: github.event.schedule == '40 5 * * 1-5'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: bash .github/scripts/run-job.sh news-tw

      - name: US news research
        if: github.event.schedule == '40 20 * * 1-5'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: bash .github/scripts/run-job.sh news-us

      - name: TW daily sequence
        if: github.event.schedule == '30 6 * * 1-5'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: |
          for job in news-tw sync-tw sim-fill-tw nav-tw alerts-tw ai-batch-tw sim-decide-tw; do
            echo "== $job =="
            bash .github/scripts/run-job.sh "$job"
          done

      - name: US daily sequence
        if: github.event.schedule == '30 21 * * 1-5'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: |
          for job in news-us sync-us sim-fill-us nav-us alerts-us ai-batch-us sim-decide-us; do
            echo "== $job =="
            bash .github/scripts/run-job.sh "$job"
          done
