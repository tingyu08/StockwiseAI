# 方案 B 排程（docs/SD.md §6.2）：Render 免費層會休眠，排程由此觸發並順便喚醒。
# 時間為 UTC（台灣 = UTC+8）。需設定 repo secrets：BACKEND_URL、JOB_TOKEN；選配 NOTIFY_WEBHOOK_URL。
#
# 設計：分析/決策＝開盤前晨間（已消化昨收＋隔夜行情），委託成交於當日開盤價；
#       資料任務（同步/撮合/淨值/警示）＝收盤後。
#       排程時間刻意提早——GitHub cron 常延遲 1~2 小時，提早排以確保趕在開盤前；
#       就算延遲到開盤後，引擎會自動改吃下一個開盤價，不會有前視偏誤。
name: daily-jobs

on:
  schedule:
    - cron: "10 22 * * 0-4"  # 06:10 TW 次日 — 台股晨間：新聞→AI批次→簡報→產生委託（09:00 開盤成交）
    - cron: "30 6 * * 1-5"   # 14:30 TW — 台股收盤後：同步→撮合晨間委託→淨值→警示
    - cron: "40 11 * * 1-5"  # 19:40 TW — 美股晨間（美東開盤前）：新聞→AI批次→簡報→產生委託（21:30 開盤成交）
    - cron: "30 21 * * 1-5"  # 05:30 TW 次日 — 美股收盤後：同步→撮合→淨值→警示
    - cron: "15 19 * * 0"    # 每週一 03:15 TW — 清理過期 operational history
    # 盤中哨兵不在此處：需分鐘級準時，由後端 APScheduler 執行
    # （external 模式 + UptimeRobot keep-alive，見 backend/app/scheduler/jobs.py）
  workflow_dispatch:
    inputs:
      job:
        description: "手動觸發單一 job（如 sync-tw、news-us、ai-batch-tw）"
        required: true

env:
  BASE: ${{ secrets.BACKEND_URL }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Wake Render (free tier cold start)
        run: |
          for i in $(seq 1 8); do
            curl -sf --max-time 20 "$BASE/api/v1/health" && exit 0
            echo "waiting for backend... ($i)"; sleep 15
          done
          echo "backend did not wake up"; exit 1

      - name: Manual job
        if: github.event_name == 'workflow_dispatch'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: bash .github/scripts/run-job.sh "${{ inputs.job }}"

      - name: TW pre-open sequence
        if: github.event.schedule == '10 22 * * 0-4'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: |
          for job in news-tw ai-batch-tw overview-tw sim-decide-tw; do
            echo "== $job =="
            bash .github/scripts/run-job.sh "$job"
          done

      - name: TW post-close sequence
        if: github.event.schedule == '30 6 * * 1-5'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: |
          for job in sync-tw sim-fill-tw nav-tw alerts-tw; do
            echo "== $job =="
            bash .github/scripts/run-job.sh "$job"
          done

      - name: US pre-open sequence
        if: github.event.schedule == '40 11 * * 1-5'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: |
          for job in news-us ai-batch-us overview-us sim-decide-us; do
            echo "== $job =="
            bash .github/scripts/run-job.sh "$job"
          done

      - name: US post-close sequence
        if: github.event.schedule == '30 21 * * 1-5'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: |
          for job in sync-us sim-fill-us nav-us alerts-us; do
            echo "== $job =="
            bash .github/scripts/run-job.sh "$job"
          done

      - name: Weekly maintenance
        if: github.event.schedule == '15 19 * * 0'
        env:
          JOB_TOKEN: ${{ secrets.JOB_TOKEN }}
        run: bash .github/scripts/run-job.sh maintenance

      - name: Notify on failure
        if: failure()
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -n "$NOTIFY_WEBHOOK_URL" ]; then
            curl -sf --max-time 20 -X POST "$NOTIFY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"daily-jobs 排程失敗（schedule: ${{ github.event.schedule || 'manual' }}）: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              || echo "notify webhook failed"
          else
            echo "NOTIFY_WEBHOOK_URL not set; skip notification"
          fi
