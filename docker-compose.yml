services:
  backend:
    build: ./backend
    ports:
      - "8123:8000"  # host 8000 落在 Windows 保留 port 範圍，改用 8123
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////data/app.db
      - SCHEDULER_MODE=internal
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8123
    depends_on:
      - backend
    restart: unless-stopped
